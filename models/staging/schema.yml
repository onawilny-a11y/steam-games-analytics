version: 2

models:
  - name: stg_games
    description: "Thin staging view over raw Steam games metadata, cleanly casted and standardized."
    columns:
      - name: game_id
        tests:
          - unique
          - not_null
      - name: game_title
        description: "The official title of the game."
      - name: release_year
        description: "The calendar year the game was launched on Steam."
      - name: launch_price_usd
        description: "The base retail price of the game at launch in USD."

  - name: stg_transactions
    description: "Thin staging view over raw transactional sales records, tracking itemized customer purchases."
    columns:
      - name: transaction_id
        description: "The unique identifier (Primary Key) for each individual transaction."
        tests:
          - unique
          - not_null
      - name: game_id
        description: "Foreign key linking back to stg_games."
      - name: customer_id
        description: "The encrypted or unique identifier for the purchasing user."
      - name: sale_date
        description: "The calendar date the purchase occurred."
      - name: unit_price_usd
        description: "The final gross price per unit paid by the customer."
      - name: discount_percentage
        description: "The integer discount percentage applied to the transaction (e.g., 20 = 20% off)."